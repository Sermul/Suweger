    content: `
      <h2>Pendahuluan</h2>
      <p>Bulan Ramadan adalah bulan yang penuh berkah dan rahmat dari Allah SWT. Di bulan ini, semua amal kebaikan akan mendapat pahala yang berlipat ganda, termasuk membaca Al-Quran. Rasulullah SAW bersabda dalam sebuah hadits yang diriwayatkan oleh Imam Tirmidzi:</p>

      <p>Umar bin Khattab awalnya adalah musuh besar Islam. Suatu hari, ia berniat membunuh Rasulullah SAW, tetapi Allah menghidayatinya. Setelah masuk Islam, ia menjadi salah satu sahabat terkuat dan kemudian menjadi khalifah kedua yang sangat adil.</p>

      <h2>Tips Menjalankan Puasa Sunnah</h2>
      <h3>1. Mulai Bertahap</h3>
      <ul>
        <li>Mulai dengan puasa Senin-Kamis</li>
        <li>Tambah dengan Ayyamul Bidh</li>
        <li>Tingkatkan secara bertahap</li>
      </ul>
      
      <h3>2. Buat Jadwal Rutin</h3>
      <ul>
        <li>Tentukan hari-hari puasa sunnah</li>
        <li>Buat reminder di kalender</li>
        <li>Konsisten dalam menjalankan</li>
      </ul>
      
      <h3>3. Perhatikan Kondisi Tubuh</h3>
      <ul>
        <li>Jangan memaksakan jika sakit</li>
        <li>Perhatikan asupan nutrisi saat berbuka</li>
        <li>Istirahat yang cukup</li>
      </ul>
      
      <h3>4. Kombinasikan dengan Ibadah Lain</h3>
      <ul>
        <li>Perbanyak dzikir dan doa</li>
        <li>Baca Al-Quran lebih banyak</li>
        <li>Tingkatkan sedekah</li>
      </ul>
      
      <h2>Puasa Sunnah untuk Wanita</h2>
      <h3>Ketentuan Khusus:</h3>
      <ul>
        <li>Tidak boleh puasa saat haid dan nifas</li>
        <li>Perlu izin suami jika sudah menikah</li>
        <li>Boleh dibatalkan jika ada keperluan keluarga</li>
        <li>Qadha tidak wajib untuk puasa sunnah</li>
      </ul>
      
      <h2>Puasa yang Dilarang</h2>
      <p>Ada beberapa hari yang dilarang untuk berpuasa:</p>
      <ul>
        <li>Hari Raya Idul Fitri dan Idul Adha</li>
        <li>Hari Tasyriq (11, 12, 13 Dzulhijjah)</li>
        <li>Puasa terus-menerus tanpa berbuka (Wishal)</li>
        <li>Puasa hanya hari Jumat saja</li>
        <li>Puasa hanya hari Sabtu saja</li>
      </ul>
      
      <h2>Kesimpulan</h2>
      <p>Puasa sunnah adalah ibadah yang sangat bermanfaat, baik secara spiritual maupun kesehatan. Dengan menjalankan puasa sunnah secara rutin dan konsisten, kita dapat meningkatkan kualitas ibadah, kesehatan tubuh, dan kedekatan dengan Allah SWT. Mari kita jadikan puasa sunnah sebagai bagian dari rutinitas ibadah kita.</p>

    function getUrlParameter(name) {
      name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
      const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
      const results = regex.exec(location.search);
      return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }

    function loadArticle() {
      const articleId = getUrlParameter('id');
      const article = articlesData[articleId];

      if (!article) {
        document.getElementById('articleHeader').innerHTML = '<h1>Artikel tidak ditemukan</h1>';
        return;
      }

      // Update page title
      document.title = `${article.title} - Islamic Portal`;
      document.getElementById('currentArticleTitle').textContent = article.title;

      // Load article header
      document.getElementById('articleHeader').innerHTML = `
        <div class="article-category">${article.category}</div>
        <h1 class="article-title">${article.title}</h1>
        <div class="article-meta">
          <div class="meta-item">
            <span>📅</span>
            <span>${formatDate(article.date)}</span>
          </div>
          <div class="meta-item">
            <span>⏱️</span>
            <span>${article.readTime} baca</span>
          </div>
          <div class="meta-item">
            <span>👤</span>
            <span>${article.author}</span>
          </div>
        </div>
        <p class="article-excerpt">${article.excerpt}</p>
      `;

      // Load article image
      document.getElementById('articleImage').innerHTML = article.image;

      // Load article content
      document.getElementById('articleContent').innerHTML = article.content;

      // Load related articles
      loadRelatedArticles();
    }

    function loadRelatedArticles() {
      const relatedGrid = document.getElementById('relatedArticles');
      relatedGrid.innerHTML = '';

      relatedArticlesData.forEach(article => {
        const card = document.createElement('div');
        card.className = 'related-card';
        card.onclick = () => window.location.href = `artikel_detail.html?id=${article.id}`;

        card.innerHTML = `
          <div class="related-card-title">${article.title}</div>
          <div class="related-card-meta">${formatDate(article.date)}</div>
        `;

        relatedGrid.appendChild(card);
      });
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return date.toLocaleDateString('id-ID', options);
    }

    function shareToFacebook() {
      const url = encodeURIComponent(window.location.href);
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
    }

    function shareToTwitter() {
      const url = encodeURIComponent(window.location.href);
      const text = encodeURIComponent(document.querySelector('.article-title').textContent);
      window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank');
    }

    function shareToWhatsApp() {
      const url = encodeURIComponent(window.location.href);
      const text = encodeURIComponent(document.querySelector('.article-title').textContent);
      window.open(`https://wa.me/?text=${text} ${url}`, '_blank');
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        alert('Link berhasil disalin!');
      });
    }

    // Mobile menu toggle
    function toggleMobileMenu() {
      const mobileMenu = document.getElementById('mobileMenu');
      mobileMenu.style.display = mobileMenu.style.display === 'block' ? 'none' : 'block';
    }

    // Update current time
    function updateTime() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('id-ID');
      document.getElementById('currentTime').textContent = timeString;
    }

    // Close mobile menu when clicking outside
    document.addEventListener('click', function(e) {
      const mobileMenu = document.getElementById('mobileMenu');
      const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
      
      if (!mobileMenu.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
        mobileMenu.style.display = 'none';
      }
    });

    // Initialize
    updateTime();
    setInterval(updateTime, 1000);
    loadArticle();
  </script>
