    ];

    function getUrlParameter(name) {
      name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
      const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
      const results = regex.exec(location.search);
      return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }

    function loadArticle() {
      const articleId = getUrlParameter('id');
      const article = articlesData[articleId];

      if (!article) {
        document.getElementById('articleHeader').innerHTML = '<h1>Artikel tidak ditemukan</h1>';
        return;
      }

      // Update page title
      document.title = `${article.title} - Islamic Portal`;
      document.getElementById('currentArticleTitle').textContent = article.title;

      // Load article header
      document.getElementById('articleHeader').innerHTML = `
        <div class="article-category">${article.category}</div>
        <h1 class="article-title">${article.title}</h1>
        <div class="article-meta">
          <div class="meta-item">
            <span>📅</span>
            <span>${formatDate(article.date)}</span>
          </div>
          <div class="meta-item">
            <span>⏱️</span>
            <span>${article.readTime} baca</span>
          </div>
          <div class="meta-item">
            <span>👤</span>
            <span>${article.author}</span>
          </div>
        </div>
        <p class="article-excerpt">${article.excerpt}</p>
      `;

      // Load article image
      const imageElement = document.getElementById('articleImage');
      if (article.image) {
        // Cek apakah gambar ada
        const img = new Image();
        img.onload = function() {
          console.log('Gambar artikel utama berhasil dimuat:', article.image);
          imageElement.innerHTML = `<img src="${article.image}" alt="${article.title}" />`;
        };
        img.onerror = function() {
          // Jika gambar tidak ditemukan, tampilkan placeholder
          console.error('Gambar artikel utama gagal dimuat:', article.image);
          imageElement.innerHTML = `<div class="placeholder-text">Gambar Artikel<br><small>Letakkan gambar di folder: ${article.image}</small></div>`;
        };
        console.log('Mencoba memuat gambar artikel utama:', article.image);
        img.src = article.image;
      } else {
        imageElement.innerHTML = `<div class="placeholder-text">Gambar Artikel</div>`;
      }

      // Load article content
      document.getElementById('articleContent').innerHTML = article.content;

      // Load related articles
      loadRelatedArticles();
    }

    function loadRelatedArticles() {
      const relatedGrid = document.getElementById('relatedArticles');
      relatedGrid.innerHTML = '';

      relatedArticlesData.forEach(article => {
        const card = document.createElement('div');
        card.className = 'related-card';
        card.onclick = () => window.location.href = `artikel_detail.html?id=${article.id}`;

        // Create image element
        let imageContent = '';
        if (article.image) {
          imageContent = `<div class="placeholder-text">Loading...</div>`;
          
          // Gunakan setTimeout untuk memastikan DOM sudah dirender
          setTimeout(() => {
            const img = new Image();
            const imageDiv = card.querySelector('.related-card-image');
            
            img.onload = function() {
              if (imageDiv) {
                imageDiv.innerHTML = `<img src="${article.image}" alt="${article.title}" />`;
                console.log('Image loaded successfully:', article.image);
              }
            };
            
            img.onerror = function() {
              if (imageDiv) {
                imageDiv.innerHTML = `<div class="placeholder-text">Cover Artikel<br><small>${article.image}</small></div>`;
                console.log('Image failed to load:', article.image);
              }
            };
            
            img.src = article.image;
            console.log('Loading image:', article.image);
          }, 10);
        } else {
          imageContent = `<div class="placeholder-text">Cover Artikel</div>`;
        }

        card.innerHTML = `
          <div class="related-card-image">${imageContent}</div>
          <div class="related-card-content">
            <div class="related-card-category">${article.category}</div>
            <div class="related-card-title">${article.title}</div>
            <div class="related-card-excerpt">${article.excerpt}</div>
            <div class="related-card-meta">
              <span>📅 ${formatDate(article.date)}</span>
              <span>⏱️ ${article.readTime}</span>
            </div>
          </div>
        `;

        relatedGrid.appendChild(card);
      });
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return date.toLocaleDateString('id-ID', options);
    }

    function shareToFacebook() {
      const url = encodeURIComponent(window.location.href);
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
    }

    function shareToTwitter() {
      const url = encodeURIComponent(window.location.href);
      const text = encodeURIComponent(document.querySelector('.article-title').textContent);
      window.open(`https://twitter.com/intent/tweet?url=${url}&text=${text}`, '_blank');
    }

    function shareToWhatsApp() {
      const url = encodeURIComponent(window.location.href);
      const text = encodeURIComponent(document.querySelector('.article-title').textContent);
      window.open(`https://wa.me/?text=${text} ${url}`, '_blank');
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        alert('Link berhasil disalin!');
      });
    }

    // Mobile menu toggle
    function toggleMobileMenu() {
      const mobileMenu = document.getElementById('mobileMenu');
      mobileMenu.style.display = mobileMenu.style.display === 'block' ? 'none' : 'block';
    }

    // Update current time
    function updateTime() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('id-ID');
      document.getElementById('currentTime').textContent = timeString;
    }

    // Close mobile menu when clicking outside
    document.addEventListener('click', function(e) {
      const mobileMenu = document.getElementById('mobileMenu');
      const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
      
      if (!mobileMenu.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
        mobileMenu.style.display = 'none';
      }
    });

    // Initialize
    updateTime();
    setInterval(updateTime, 1000);
    loadArticle();
  </script>
