<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QalbuMuslim - Website Islam Terlengkap</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #fdfaf4;
      color: #001f3f;
    }

    /* Header harus di luar container */
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(30, 58, 95, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 15px 20px;
      box-shadow: 0 2px 10px rgba(30, 58, 95, 0.1);
      width: 100%;
      box-sizing: border-box;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
    }

    .logo-text {
      font-size: 26px;
      font-weight: bold;
      color: #1e3a5f;
    }

    .logo-subtitle {
      font-size: 12px;
      color: #4a5568;
      font-weight: normal;
    }

    .nav-menu {
      display: flex;
      gap: 35px;
      align-items: center;
    }

    .nav-item {
      color: #4a5568;
      text-decoration: none;
      font-weight: 500;
      padding: 10px 18px;
      border-radius: 25px;
      transition: all 0.3s ease;
      font-size: 15px;
    }

    .nav-item:hover,
    .nav-item.active {
      color: #1e3a5f;
      background: rgba(30, 58, 95, 0.1);
      transform: translateY(-1px);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #4a5568;
      font-size: 14px;
      padding: 8px 15px;
      background: rgba(30, 58, 95, 0.05);
      border-radius: 20px;
    }

    .time-now {
      font-size: 16px;
      font-weight: 600;
      color: #1e3a5f;
      padding: 8px 15px;
      background: rgba(30, 58, 95, 0.1);
      border-radius: 20px;
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      font-size: 24px;
      color: #1e3a5f;
      cursor: pointer;
      padding: 8px;
    }

    .mobile-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(30, 58, 95, 0.1);
      padding: 20px;
      box-shadow: 0 5px 20px rgba(30, 58, 95, 0.1);
    }

    .mobile-nav {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Container untuk konten utama */
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #001f3f;
    }

    .search-box {
      width: 100%;
      padding: 12px;
      margin-bottom: 30px;
      border: 2px solid #001f3f;
      border-radius: 10px;
      font-size: 1em;
      background-color: #fff;
      box-sizing: border-box;
    }

    .surah-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .surah-card {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      position: relative;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s ease;
      cursor: pointer;
    }

    .surah-card:hover {
      transform: scale(1.02);
    }

    .surah-info {
      z-index: 1;
    }

    .surah-name {
      font-weight: bold;
      font-size: 1.2em;
    }

    .surah-details {
      font-size: 0.95em;
      margin-top: 8px;
    }

    .hover-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 0.3s ease;
      background-color: rgba(255,255,255,0.9);
      z-index: 2;
      padding: 10px;
    }

    .surah-card:hover .hover-image {
      opacity: 1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-menu {
        display: none;
      }
      
      .mobile-menu-btn {
        display: block;
      }
      
      .user-info {
        gap: 10px;
      }
      
      .location,
      .time-now {
        font-size: 12px;
        padding: 6px 10px;
      }
      
      .container {
        padding: 20px;
      }
      
      .surah-list {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 15px;
      }
    }
  </style>
</head>

  const surahList = document.getElementById('surahList');
  const searchInput = document.getElementById('searchInput');

  function renderSurahList(filter = "") {
    surahList.innerHTML = "";
    surahData
      .filter(surah => surah.nama.toLowerCase().includes(filter.toLowerCase()))
      .forEach(surah => {
        const card = document.createElement('div');
        card.className = 'surah-card';
        card.innerHTML = `
          <img class="hover-image" src="${surah.gambar}" alt="${surah.nama}">
          <div class="surah-info">
            <div class="surah-name">${surah.urutan}. ${surah.nama}</div>
            <div class="surah-details">Arti: ${surah.arti}</div>
            <div class="surah-details">Jumlah Ayat: ${surah.jumlahAyat}</div>
          </div>
        `;
        // Add click event to redirect to detail_surah.html with query parameters
        card.addEventListener('click', () => {
          window.location.href = `detail_surah.html?urutan=${surah.urutan}&nama=${encodeURIComponent(surah.nama)}&arti=${encodeURIComponent(surah.arti)}&jumlahAyat=${surah.jumlahAyat}&gambar=${encodeURIComponent(surah.gambar)}`;
        });
        surahList.appendChild(card);
      });

    // Add hover event listeners for images
    const cards = document.querySelectorAll('.surah-card');
    cards.forEach(card => {
      card.addEventListener('mouseenter', () => {
        const img = card.querySelector('.hover-image');
        img.style.opacity = '1';
      });

      card.addEventListener('mouseleave', () => {
        const img = card.querySelector('.hover-image');
        img.style.opacity = '0';
      });
    });
  }

  // Panggil fungsi awal
  renderSurahList();

  // Tambahkan event listener untuk input pencarian
  searchInput.addEventListener('input', () => {
    renderSurahList(searchInput.value);
  });

  // Fungsi toggle menu mobile
  function toggleMobileMenu() {
    const mobileMenu = document.getElementById('mobileMenu');
    mobileMenu.style.display = mobileMenu.style.display === 'block' ? 'none' : 'block';
  }

  // Menampilkan waktu sekarang
  function updateTime() {
    const now = new Date();
    const timeString = now.toLocaleTimeString('id-ID', { hour12: false });
    document.getElementById('currentTime').textContent = timeString;
  }

  setInterval(updateTime, 1000);
  updateTime();
</script>
