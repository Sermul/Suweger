<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artikel Islam - QalbuMuslim</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f8f6f0 0%, #e8e2d4 100%);
      min-height: 100vh;
      color: #2c3e50;
    }

    /* Background Pattern */
    .background-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="islamic" patternUnits="userSpaceOnUse" width="40" height="40"><circle cx="20" cy="20" r="2" fill="%23f0ebe0" opacity="0.3"/><path d="M20 10 L25 15 L20 20 L15 15 Z" fill="%23f0ebe0" opacity="0.2"/></pattern></defs><rect width="100" height="100" fill="url(%23islamic)"/></svg>');
      opacity: 0.1;
      pointer-events: none;
      z-index: -1;
    }

    /* Header Styles */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(30, 58, 95, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 20px;
            box-shadow: 0 2px 10px rgba(30, 58, 95, 0.1);
            width: 100%;
            box-sizing: border-box;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 26px;
            font-weight: bold;
            color: #1e3a5f;
        }

        .nav-menu {
            display: flex;
            gap: 35px;
            align-items: center;
        }

        .nav-item {
            color: #4a5568;
            text-decoration: none;
            font-weight: 500;
            padding: 10px 18px;
            border-radius: 25px;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #1e3a5f;
            background: rgba(30, 58, 95, 0.1);
            transform: translateY(-1px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .location {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #4a5568;
            font-size: 14px;
            padding: 8px 15px;
            background: rgba(30, 58, 95, 0.05);
            border-radius: 20px;
        }

        .location img {
            width: 16px;
            height: 16px;
        }

        .time-now {
            font-size: 16px;
            font-weight: 600;
            color: #1e3a5f;
            padding: 8px 15px;
            background: rgba(30, 58, 95, 0.1);
            border-radius: 20px;
        }

    /* Mobile Menu */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      font-size: 24px;
      color: #1e3a5f;
      cursor: pointer;
      padding: 8px;
    }

    .mobile-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(30, 58, 95, 0.1);
      padding: 20px;
      box-shadow: 0 5px 20px rgba(30, 58, 95, 0.1);
    }

    .mobile-nav {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px;
      position: relative;
      z-index: 1;
    }

    /* Page Header */
    .page-header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px 0;
    }

    .page-title {
      font-size: 36px;
      font-weight: bold;
      color: #1e3a5f;
      margin-bottom: 15px;
    }

    .page-subtitle {
      font-size: 18px;
      color: #4a5568;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Filter Section */
    .filter-section {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(30, 58, 95, 0.1);
    }

    .filter-row {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      padding: 12px 20px;
      border: 2px solid rgba(30, 58, 95, 0.2);
      border-radius: 25px;
      font-size: 16px;
      background: white;
      outline: none;
      transition: all 0.3s ease;
    }

    .search-box:focus {
      border-color: #1e3a5f;
      box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
    }

    .category-filter {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 8px 16px;
      border: 2px solid rgba(30, 58, 95, 0.2);
      background: white;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      color: #4a5568;
    }

    .category-btn.active,
    .category-btn:hover {
      background: #1e3a5f;
      color: white;
      border-color: #1e3a5f;
    }

    /* Articles Grid */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }

    /* Article Card */
    .article-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 
        0 10px 30px rgba(30, 58, 95, 0.1),
        0 5px 15px rgba(30, 58, 95, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(30, 58, 95, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .article-card:hover {
      transform: translateY(-5px);
      box-shadow: 
        0 20px 40px rgba(30, 58, 95, 0.15),
        0 10px 20px rgba(30, 58, 95, 0.1);
    }

    .article-image {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
    }

    .article-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .article-content {
      padding: 25px;
    }

    .article-category {
      display: inline-block;
      background: rgba(30, 58, 95, 0.1);
      color: #1e3a5f;
      padding: 4px 12px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 15px;
    }

    .article-title {
      font-size: 20px;
      font-weight: bold;
      color: #1e3a5f;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .article-excerpt {
      font-size: 14px;
      color: #4a5568;
      line-height: 1.6;
      margin-bottom: 20px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .article-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      border-top: 1px solid rgba(30, 58, 95, 0.1);
    }

    .article-date {
      font-size: 12px;
      color: #718096;
    }

    /* Featured Article */
    .featured-article {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .featured-image {
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
    }

    .featured-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .featured-content {
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .featured-badge {
      background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
      color: white;
      padding: 6px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      align-self: flex-start;
      margin-bottom: 15px;
    }

    .featured-title {
      font-size: 28px;
      font-weight: bold;
      color: #1e3a5f;
      margin-bottom: 15px;
      line-height: 1.3;
    }

    .featured-excerpt {
      font-size: 16px;
      color: #4a5568;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 40px;
    }

    .page-btn {
      padding: 10px 15px;
      border: 2px solid rgba(30, 58, 95, 0.2);
      background: white;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #4a5568;
      text-decoration: none;
    }

    .page-btn.active,
    .page-btn:hover {
      background: #1e3a5f;
      color: white;
      border-color: #1e3a5f;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 50px;
      color: #4a5568;
      font-size: 18px;
    }

    /* No Results */
    .no-results {
      text-align: center;
      padding: 50px;
      color: #4a5568;
    }

    .no-results h3 {
      margin-bottom: 10px;
      color: #1e3a5f;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .nav-menu {
        display: none;
      }
      
      .mobile-menu-btn {
        display: block;
      }
      
      .container {
        padding: 20px 15px;
      }
      
      .articles-grid {
        grid-template-columns: 1fr;
      }
      
      .featured-article {
        grid-template-columns: 1fr;
      }
      
      .featured-image {
        height: 200px;
      }
      
      .filter-row {
        flex-direction: column;
        align-items: stretch;
      }
      
      .search-box {
        min-width: auto;
      }
      
      .page-title {
        font-size: 28px;
      }
      
      .featured-title {
        font-size: 24px;
      }
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .article-card {
      animation: fadeInUp 0.6s ease forwards;
    }

    .article-card:nth-child(1) { animation-delay: 0.1s; }
    .article-card:nth-child(2) { animation-delay: 0.2s; }
    .article-card:nth-child(3) { animation-delay: 0.3s; }
    .article-card:nth-child(4) { animation-delay: 0.4s; }
    .article-card:nth-child(5) { animation-delay: 0.5s; }
    .article-card:nth-child(6) { animation-delay: 0.6s; }
  </style>
</head>
<body>
  <div class="background-overlay"></div>

  <!-- Header -->
  <header class="header">

      <a href="index.html" class="logo">

  <!-- Main Content -->
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Artikel Islam</h1>
      <p class="page-subtitle">Kumpulan artikel, kajian, dan pembahasan seputar Islam untuk memperdalam pemahaman agama</p>
    </div>

    <!-- Filter Section -->
    <div class="filter-section">
      <div class="filter-row">
        <input type="text" id="searchInput" class="search-box" placeholder=" Cari artikel...">
        <div class="category-filter">
          <button class="category-btn active" data-category="semua">Semua</button>
          <button class="category-btn" data-category="ibadah">Ibadah</button>
          <button class="category-btn" data-category="akhlak">Akhlak</button>
          <button class="category-btn" data-category="sejarah">Sejarah</button>
          <button class="category-btn" data-category="fiqh">Fiqh</button>
          <button class="category-btn" data-category="motivasi">Motivasi</button>
        </div>
      </div>
    </div>

    <!-- Articles Grid -->
    <div id="articlesGrid" class="articles-grid">
      <div id="loading" class="loading">Memuat artikel...</div>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    const articlesData = [
      {
        id: 1,
        title: "Keutamaan Membaca Al-Quran di Bulan Ramadan",
        excerpt: "Pahala membaca Al-Quran di bulan Ramadan akan dilipatgandakan. Simak penjelasan tentang keutamaan dan adab membaca.",
        category: "ibadah",
        date: "2024-01-15",
        image: "image/artikelb1.jpg",
        featured: true
      },
      {
        id: 2,
        title: "Adab dan Tata Cara Sholat yang Benar",
        excerpt: "Panduan lengkap tentang adab dan tata cara sholat sesuai dengan sunnah Rasulullah SAW. Mulai dari persiapan hingga salam.",
        category: "ibadah",
        date: "2024-01-14",
        image: "image/artikelb3.jpg"
      },
      {
        id: 3,
        title: "Akhlak Mulia dalam Kehidupan Sehari-hari",
        excerpt: "Bagaimana menerapkan akhlak mulia dalam kehidupan sehari-hari sesuai dengan ajaran Islam dan contoh dari Rasulullah SAW.",
        category: "akhlak",
        date: "2024-01-13",
        image: "image/artiklb2.jpg"
      },
      {
        id: 4,
        title: "Sejarah Turunnya Al-Quran",
        excerpt: "Mengenal sejarah turunnya Al-Quran, dari wahyu pertama di Gua Hira hingga wahyu terakhir yang diterima Rasulullah SAW.",
        category: "sejarah",
        date: "2024-01-12",
        image: "image/artikelb3.jpg"
      },
      {
        id: 5,
        title: "Hukum Zakat dalam Islam",
        excerpt: "Pembahasan lengkap tentang hukum zakat, jenis-jenis zakat, nisab, dan cara perhitungannya menurut syariat Islam.",
        category: "fiqh",
        date: "2024-01-11",
        image: "image/artiklb2.jpg"
      },
      {
        id: 6,
        title: "Motivasi dari Kisah Para Sahabat",
        excerpt: "Belajar dari perjuangan dan keteguhan iman para sahabat Rasulullah yang dapat menjadi motivasi dalam kehidupan kita.",
        category: "motivasi",
        date: "2024-01-10",
        image: "image/artikelb3.jpg"
      },
      {
        id: 7,
        title: "Doa-Doa Mustajab di Waktu Tertentu",
        excerpt: "Ketahui waktu-waktu mustajab untuk berdoa dan doa-doa yang dianjurkan untuk diamalkan setiap hari.",
        category: "ibadah",
        date: "2024-01-09",
        image: "image/artiklb2.jpg"
      },
      {
        id: 8,
        title: "Hikmah dan Manfaat Puasa Sunnah",
        excerpt: "Puasa sunnah memiliki banyak hikmah dan manfaat, baik secara spiritual maupun kesehatan. Simak penjelasan lengkapnya.",
        category: "ibadah",
        date: "2024-01-08",
        image: "image/artikelb3.jpg"
      },
      {
        id: 7,
        title: "Doa-Doa Mustajab di Waktu Tertentu",
        excerpt: "Ketahui waktu-waktu mustajab untuk berdoa dan doa-doa yang dianjurkan untuk diamalkan setiap hari.",
        category: "ibadah",
        date: "2024-01-09",
        image: "image/artiklb2.jpg"
      },
      
      
    ];

    let currentPage = 1;
    const articlesPerPage = 6;
    let filteredArticles = [...articlesData];

    function renderArticles() {
      const articlesGrid = document.getElementById('articlesGrid');
      const pagination = document.getElementById('pagination');
      const loading = document.getElementById('loading');

      if (!articlesGrid || !pagination || !loading) {
        console.error('Required elements not found!');
        return;
      }

      loading.style.display = 'block';
      articlesGrid.innerHTML = '';

      const startIndex = (currentPage - 1) * articlesPerPage;
      const endIndex = startIndex + articlesPerPage;
      const articlesToShow = filteredArticles.slice(startIndex, endIndex);

      if (currentPage === 1) {
        const featuredArticle = articlesData.find(article => article.featured);
        if (featuredArticle) {
          const featuredCard = createFeaturedArticleCard(featuredArticle);
          articlesGrid.appendChild(featuredCard);
        }
      }

      articlesToShow.forEach(article => {
        if (!article.featured || currentPage !== 1) {
          const articleCard = createArticleCard(article);
          articlesGrid.appendChild(articleCard);
        }
      });

      renderPagination();
      loading.style.display = 'none';
    }

    function createFeaturedArticleCard(article) {
      const card = document.createElement('div');
      card.className = 'featured-article';
      card.onclick = () => openArticle(article.id);

      card.innerHTML = `
        <div class="featured-image">
          <img src="${article.image}" alt="${article.title}" onerror="this.src='image/fallback.jpg';">
        </div>
        <div class="featured-content">
          <div class="featured-badge">Artikel Pilihan</div>
          <h2 class="featured-title">${article.title}</h2>
          <p class="featured-excerpt">${article.excerpt}</p>
          <div class="article-meta">
            <span class="article-date">${formatDate(article)}</span>
          </div>
        </div>
      `;
      return card;
    }

    function createArticleCard(article) {
      const card = document.createElement('div');
      card.className = 'article-card';
      card.onclick = () => openArticle(article.id);

      card.innerHTML = `
        <div class="article-image">
          <img src="${article.image}" alt="${article.title}" onerror="this.src='image/fallback.jpg';">
        </div>
        <div class="article-content">
          <div class="article-category">${getCategoryName(article.category)}</div>
          <h3 class="article-title">${article.title}</h3>
          <p class="article-excerpt">${article.excerpt}</p>
          <div class="article-meta">
            <span class="article-date">${formatDate(article)}</span>
          </div>
        </div>
      `;
      return card;
    }

    function renderPagination() {
      const pagination = document.getElementById('pagination');
      if (!pagination) return;

      const totalPages = Math.ceil(filteredArticles.length / articlesPerPage);
      pagination.innerHTML = '';

      if (totalPages <= 1) return;

      if (currentPage > 1) {
        pagination.innerHTML += `<a href="#" class="page-btn" onclick="changePage(${currentPage - 1});return false;">Sebelumnya</a>`;
      }

      for (let i = 1; i <= totalPages; i++) {
        const activeClass = i === currentPage ? 'active' : '';
        pagination.innerHTML += `<a href="#" class="page-btn ${activeClass}" onclick="changePage(${i});return false;">${i}</a>`;
      }

      if (currentPage < totalPages) {
        pagination.innerHTML += `<a href="#" class="page-btn" onclick="changePage(${currentPage + 1});return false;">Selanjutnya</a>`;
      }
    }

    function changePage(page) {
      currentPage = page;
      renderArticles();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterArticles() {
      const searchInput = document.getElementById('searchInput');
      if (!searchInput) {
        console.error('Search input not found!');
        return;
      }
      const searchTerm = searchInput.value.toLowerCase();
      const activeCategory = document.querySelector('.category-btn.active')?.dataset.category || 'semua';

      filteredArticles = articlesData.filter(article => {
        const matchesSearch = article.title.toLowerCase().includes(searchTerm) ||
                            article.excerpt.toLowerCase().includes(searchTerm);
        const matchesCategory = activeCategory === 'semua' || article.category === activeCategory;
        return matchesSearch && matchesCategory;
      });

      currentPage = 1;
      renderArticles();
    }

    function getCategoryName(category) {
      const categories = {
        ibadah: 'Ibadah',
        akhlak: 'Akhlak',
        sejarah: 'Sejarah',
        fiqh: 'Fiqh',
        motivasi: 'Motivasi'
      };
      return categories[category] || category;
    }

    function formatDate(article) {
      const date = new Date(article.date);
      if (isNaN(date.getTime())) {
        console.error(`Invalid date for article: ${article.title}`);
        return 'Unknown Date';
      }
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      return date.toLocaleDateString('id-ID', options);
    }

    function openArticle(id) {
      console.log(`Navigating to baca_artikel.html with ID: ${id}`);
      window.location.href = `baca_artikel.html?id=${id}`;
    }

    function toggleMobileMenu() {
      const mobileMenu = document.getElementById('mobileMenu');
      if (!mobileMenu) {
        console.error('Mobile menu not found!');
        return;
      }
      mobileMenu.style.display = mobileMenu.style.display === 'block' ? 'none' : 'block';
    }

    function updateTime() {
      const now = new Date();
      const timeElement = document.getElementById('currentTime');
      if (timeElement) {
        timeElement.textContent = now.toLocaleTimeString('id-ID');
      } else {
        console.error('Time element not found!');
      }
    }

    function initializeEventListeners() {
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', filterArticles);
      } else {
        console.error('Search input not found!');
      }

      const categoryButtons = document.querySelectorAll('.category-btn');
      if (categoryButtons.length > 0) {
        categoryButtons.forEach(button => {
          button.addEventListener('click', function() {
            categoryButtons.forEach(btn => btn.classList.remove('active'));
            this.classList.add('active');
            filterArticles();
          });
        });
      } else {
        console.error('No category buttons found!');
      }

      document.addEventListener('click', function(e) {
        const mobileMenu = document.getElementById('mobileMenu');
        const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
        if (mobileMenu && mobileMenuBtn && !mobileMenu.contains(e.target) && !mobileMenuBtn.contains(e.target)) {
          mobileMenu.style.display = 'none';
        }
      });
    }

    try {
      updateTime();
      setInterval(updateTime, 1000);
      initializeEventListeners();
      renderArticles();
    } catch (error) {
      console.error('Error initializing page:', error);
      const loading = document.getElementById('loading');
      if (loading) {
        loading.textContent = 'Gagal memuat artikel. Silakan periksa konsol untuk kesalahan.';
      }
    }
  </script>
</body>
</html>
